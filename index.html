<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="./manifest.json">
  <title>Fichas AR</title>

  <!-- A-Frame y MindAR (se cargan desde CDN, no requieren instalación) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <!-- aframe-extras: necesario para reproducir animaciones embebidas en los .glb -->
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/dist/aframe-extras.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #result-banner {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 20, 30, 0.85); color: white; padding: 14px 22px;
      border-radius: 12px; font-size: 16px; text-align: center; display: none;
      z-index: 999; max-width: 80vw;
    }
    #result-banner strong { display: block; font-size: 20px; margin-bottom: 4px; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a1420; color: white; display: flex; align-items: center;
      justify-content: center; z-index: 1000; font-size: 18px; text-align: center;
    }
  </style>
</head>
<body>

  <div id="loading">Cargando marcadores...<br><small>Apunta la cámara a tus fichas</small></div>

  <!-- Banner que muestra el nombre del resultado descubierto -->
  <div id="result-banner">
    <strong id="result-name"></strong>
    <span id="result-desc"></span>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets/targets.mind; autoStart: true; uiScanning: no; maxTrack: 4; warmupTolerance: 5; missTolerance: 6;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >
    <a-assets timeout="30000"></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ============================================= -->
    <!-- UNA a-entity por cada FICHA BASE que fotografiaste -->
    <!-- El orden (targetIndex 0,1,2,3) debe coincidir con -->
    <!-- el orden en que subiste las imágenes al compilador -->
    <!-- de MindAR para generar targets.mind -->
    <!-- ============================================= -->

    <!-- Ficha 0: Lluvia -->
    <a-entity id="target-0" mindar-image-target="targetIndex: 0"></a-entity>

    <!-- Ficha 1: Agua -->
    <a-entity id="target-1" mindar-image-target="targetIndex: 1"></a-entity>

    <!-- Ficha 2: Tierra -->
    <a-entity id="target-2" mindar-image-target="targetIndex: 2"></a-entity>

    <!-- Ficha 3: Fuego -->
    <a-entity id="target-3" mindar-image-target="targetIndex: 3"></a-entity>

    <!-- ============================================= -->
    <!-- Punto flotante donde aparece el resultado, -->
    <!-- fuera de todas las fichas (no es hijo de ninguna). -->
    <!-- Su posición se recalcula cada frame en app.js -->
    <!-- para quedar en el punto medio entre las 2 fichas -->
    <!-- combinadas. -->
    <!-- ============================================= -->
    <a-entity id="result-stage" visible="false"></a-entity>

  </a-scene>

  <script src="./js/app.js"></script>
</body>
</html>
